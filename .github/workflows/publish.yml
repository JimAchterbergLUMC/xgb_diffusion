name: Build and publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build source distribution
        working-directory: python-package
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: python-package/dist/*.tar.gz

  build-wheels:
    name: Build wheel on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
          - name: windows-x86_64
            os: windows-latest
          - name: macos-x86_64
            os: macos-13
          - name: macos-arm64
            os: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Configure MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build wheel
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_BUILD: "cp312-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_TEST_COMMAND: >-
            python -c "from xgb_diffusion import XGBDDPMRegressor, XGBDDPMClassifier, XGBDiffusionRegressor; print('ok')"
        with:
          package-dir: python-package
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs:
      - build-sdist
      - build-wheels
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish package distributions
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
